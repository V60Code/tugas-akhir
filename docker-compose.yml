# ─────────────────────────────────────────────────────────────────────────────
# SQL Optimizer — Docker Compose
#
# Services:
#   db       → PostgreSQL 15
#   redis    → Redis 7 (Celery broker)
#   minio    → MinIO (object storage for SQL files)
#   api      → FastAPI backend
#   worker   → Celery worker (AI analysis + sandbox)
#   frontend → Next.js
#   flower   → Celery task monitor (optional, dev only)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: sql_optimizer_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sql_optimizer_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ──────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: sql_optimizer_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # MinIO requires MINIO_ROOT_USER / MINIO_ROOT_PASSWORD (not the legacy S3-style MINIO_ACCESS_KEY)
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000" # S3 API
      - "127.0.0.1:9001:9001" # Web Console — localhost only
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  api:
    build: ./backend
    container_name: sql_optimizer_api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8000:8000"
    environment:
      # Override .env with Docker-internal hostnames
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-sql-optimizer-jobs}
      SECRET_KEY: ${SECRET_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Celery Worker ──────────────────────────────────────────────────────────
  worker:
    build: ./backend
    container_name: sql_optimizer_worker
    restart: unless-stopped
    command: celery -A app.worker.celery worker --loglevel=info --concurrency=2 --max-tasks-per-child=50
    volumes:
      # Mount Docker socket so worker can spawn sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-sql-optimizer-jobs}
      SECRET_KEY: ${SECRET_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: sql_optimizer_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy

  # ── Flower (Celery Monitor) ─────────────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: sql_optimizer_flower
    restart: unless-stopped
    # Pass --basic_auth as a CLI argument — more reliable than the env var
    # approach in Flower 2.x which has inconsistent env parsing across versions.
    command: >
      celery
      --broker=redis://redis:6379/0
      flower
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD}
    environment:
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      # Bind to localhost only — Flower is a dev tool, not a public endpoint.
      - "127.0.0.1:5555:5555"
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
